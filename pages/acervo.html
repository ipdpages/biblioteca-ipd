<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acervo – Biblioteca IPD</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <div class="logo-area">
        <div class="logo-icon">📖</div>
        <div>
          <span class="logo-title">Biblioteca IPD</span>
          <span class="logo-sub">Igreja Presbiteriana</span>
        </div>
      </div>
      <nav class="nav">
        <a href="../index.html" class="nav-link">Início</a>
        <a href="acervo.html" class="nav-link active">Acervo</a>
        <a href="admin.html" class="nav-link nav-admin">Painel Admin</a>
      </nav>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <h2 class="section-title">Todo o Acervo</h2>
      <div id="alert-area"></div>

      <!-- Filtros -->
      <div class="filter-bar">
        <input type="text" id="filterTitulo" placeholder="Título ou autor..."/>
        <select id="filterCat">
          <option value="">Todas as categorias</option>
          <option>Teologia Sistemática</option>
          <option>História da Igreja</option>
          <option>Apologética</option>
          <option>Vida Cristã</option>
          <option>Missões</option>
          <option>Comentários Bíblicos</option>
          <option>Biografias</option>
          <option>Literatura Cristã</option>
        </select>
        <select id="filterStatus">
          <option value="">Qualquer status</option>
          <option value="disponivel">Disponível</option>
          <option value="emprestado">Emprestado</option>
        </select>
        <button class="btn btn-primary" onclick="filtrar()">🔍 Filtrar</button>
        <button class="btn btn-outline" onclick="limpar()">✕ Limpar</button>
      </div>

      <p id="countInfo" style="font-size:.85rem;color:var(--gray-text);margin-bottom:16px;"></p>
      <div class="books-grid" id="acervoGrid"></div>
    </div>
  </section>

  <footer class="footer">
    <p>© 2025 Biblioteca IPD · Todos os dados são utilizados exclusivamente para controle de empréstimos.</p>
  </footer>

  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script>
    let todos = getLivros();
    let filtrados = [...todos];

    function render(lista) {
      document.getElementById('countInfo').textContent = `${lista.length} livro(s) encontrado(s)`;
      renderBookGrid('acervoGrid', lista);
    }

    function filtrar() {
      const t = document.getElementById('filterTitulo').value.toLowerCase();
      const c = document.getElementById('filterCat').value;
      const s = document.getElementById('filterStatus').value;
      filtrados = todos.filter(l => {
        const matchT = !t || l.titulo.toLowerCase().includes(t) || l.autor.toLowerCase().includes(t);
        const matchC = !c || l.categoria === c;
        const matchS = !s || l.status === s;
        return matchT && matchC && matchS;
      });
      render(filtrados);
    }

    function limpar() {
      document.getElementById('filterTitulo').value = '';
      document.getElementById('filterCat').value = '';
      document.getElementById('filterStatus').value = '';
      filtrados = [...todos];
      render(filtrados);
    }

    // Pegar parâmetros da URL
    const params = new URLSearchParams(window.location.search);
    if (params.get('q')) document.getElementById('filterTitulo').value = params.get('q');
    if (params.get('cat')) document.getElementById('filterCat').value = params.get('cat');

    filtrar(); // aplica filtros iniciais se houver params
  </script>
</body>
</html>
